name: immich-testbot

services:
  database:
    container_name: immich-testbot-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    command: >
      -c fsync=off
      -c shared_preload_libraries=vchord.so
      -c config_file=/var/lib/postgresql/data/postgresql.conf
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
    shm_size: 128mb
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d immich']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  redis:
    container_name: immich-testbot-redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  immich-server:
    container_name: immich-testbot-server
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        BUILD_ID: testbot
        BUILD_IMAGE: testbot
        BUILD_SOURCE_REF: testbot
        BUILD_SOURCE_COMMIT: testbot
    ports:
      - '2283:2283'
    environment:
      DB_HOSTNAME: database
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: redis
      IMMICH_MACHINE_LEARNING_ENABLED: 'false'
      IMMICH_ENV: testing
      IMMICH_IGNORE_MOUNT_CHECK_ERRORS: 'true'
    volumes:
      - upload-data:/data
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'immich-healthcheck']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  upload-data:
